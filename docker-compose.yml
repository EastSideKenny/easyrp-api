services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyrp_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    depends_on:
      - postgres
      - redis
    networks:
      - easyrp

  nginx:
    image: nginx:alpine
    container_name: easyrp_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - easyrp

  postgres:
    image: postgres:16-alpine
    container_name: easyrp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-easyrp}
      POSTGRES_USER: ${DB_USERNAME:-easyrp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - easyrp

  redis:
    image: redis:7-alpine
    container_name: easyrp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - easyrp

  mailpit:
    image: axllent/mailpit
    container_name: easyrp_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "2525:1025"   # SMTP
    networks:
      - easyrp

networks:
  easyrp:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vendor_data: